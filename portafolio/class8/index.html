<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Modeling</title>

    <link rel="stylesheet" href="./src/css/main.css">

    <!-- model viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</head>

<body>

    <div class="frieren-title">

        <h1>FRIEREN</h1>
        <h2>Beyond Journey's End</h2>

    </div>

    <model-viewer alt="Scene 3d" src="./src/models/glb/scene.glb" shadow-intensity="1" ar
        ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate touch-action="pan-y">

        <button slot="ar-button" id="ar-button">

        </button>

        <div id="ar-prompt">
            <img src="./src/img/hand.png">
        </div>

        <button id="ar-failure">
 
        </button>

        <div class="slider">
            <div class="slides">

                <button class="slide selected" onclick="switchSrc(this, 'roca')"
                    style="background-image: url('./src/img/roca.png');">
                </button>

                <button class="slide" onclick="switchSrc(this, 'frieren')"
                    style="background-image: url('./src/img/frieren.png');">
                </button>

                <button class="slide" onclick="switchSrc(this, 'scene')"
                    style="background-image: url('./src/img/scene.png');">
                </button>

            </div>
        </div>

    </model-viewer>

    <script type="module">

        const modelViewer = document.querySelector("model-viewer");

        window.switchSrc = (element, name) => {

            const base = "./src/models/glb/" + name;
            modelViewer.src = base + '.glb';

            const slides = document.querySelectorAll(".slide");

            slides.forEach((element) => {
                element.classList.remove("selected");
            });

            element.classList.add("selected");

        };

        document.querySelector(".slider")
            .addEventListener('beforexrselect', (ev) => {

                ev.preventDefault();

            });

    </script>

</body>

</html>
